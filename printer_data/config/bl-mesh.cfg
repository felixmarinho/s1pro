[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -47
y_offset: 0
samples: 2
Speed: 4
#z_offset: 0.5
probe_with_touch_mode: true
stow_on_each_sample: False
samples_tolerance: 0.01
samples_tolerance_retries: 3
pin_up_touch_mode_reports_triggered: False   # evita falsos triggers

[bed_mesh]
speed: 60
mesh_min: 10, 10
mesh_max: 203, 215
probe_count: 10, 10
fade_start: 1
fade_end: 10
algorithm: bicubic